---
name: Run Tests
on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
permissions:
  contents: read
jobs:
  run-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - "22"
          - "24"
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - name: Install and Test
        run: |
          bun install --frozen-lockfile
          bun run lint
          bun run typecheck
          bun run build
          bun run test
