---
name: Publish Package
on:
  push:
    tags:
      - v*
permissions:
  contents: write
  id-token: write
jobs:
  publish-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json
      - name: Install and Test
        run: |
          bun install --frozen-lockfile
          bun run lint
          bun run typecheck
          bun run build
          bun run test
          bun run test:package
      - name: Pack
        run: npm pack --dry-run
      - name: Publish
        if: ${{ !env.ACT }}
        run: npm publish --access public
      - name: Create GitHub Release
        if: ${{ !env.ACT }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          awk -v version="${GITHUB_REF_NAME#v}" '
            $1 == "##" && $2 == version { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md | sed '/./,$!d' >release-notes.md

          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes-file release-notes.md
          fi
